<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Sản phẩm</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- ICON -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- HEADER CHUẨN -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <!-- LOGO -->
      <a class="navbar-brand fw-bold" href="index.html"> 💻 LaptopX </a>

      <!-- MOBILE -->
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- MENU -->
      <div class="collapse navbar-collapse" id="menu">
        <!-- LEFT -->
        <ul class="navbar-nav ms-3">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Trang chủ</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="products.html">Sản phẩm</a>
          </li>
        </ul>



        <!-- RIGHT -->
        <div class="ms-auto d-flex align-items-center gap-3">
          <span class="text-light">
            <i class="bi bi-telephone-fill"></i> 999999999
          </span>

          <a href="cart.html" class="btn btn-warning position-relative">
            🛒
            <span id="cart-count" class="badge bg-danger">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="container mt-4">
    <h3>Danh sách sản phẩm</h3>

    <!-- SEARCH -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Tìm sản phẩm..." onkeyup="searchProduct()" />

    <!-- FILTER + SORT -->
    <div class="d-flex gap-2 mb-3">
      <select class="form-select" onchange="filterBrand(this.value)">
        <option value="">Tất cả hãng</option>
        <option value="asus">ASUS</option>
        <option value="apple">Apple</option>
        <option value="lenovo">Lenovo</option>
        <option value="acer">Acer</option>
        <option value="msi">MSI</option>
      </select>

      <button id="sort-btn" onclick="sortPrice()">Giá thấp → cao</button>
    </div>

    <!-- LIST -->
    <div class="row" id="product-list"></div>
  </div>

  <!-- ===== SOCIAL CONTACT BAR ===== -->
  <div class="social-contact-bar">
    <a href="tel:999999999" class="contact-item phone" title="Gọi hotline">
      <i class="bi bi-telephone-fill"></i>
    </a>
    <a href="#" class="contact-item chat" title="Chat Zalo">
      <i class="bi bi-chat-dots-fill"></i>
    </a>
    <a href="#" class="contact-item telegram" title="Telegram">
      <i class="bi bi-telegram"></i>
    </a>
    <a href="#" class="contact-item messenger" title="Messenger">
      <i class="bi bi-messenger"></i>
    </a>
  </div>

  <!-- ===== NAVIGATION UTILS ===== -->
  <div class="nav-utils-bar">
    <div onclick="goBack()" class="util-item back-btn" title="Quay lại">
      <i class="bi bi-arrow-left"></i>
    </div>
    <div onclick="scrollToTop()" class="util-item scroll-top-btn" title="Lên đầu trang">
      <i class="bi bi-chevron-up"></i>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/main.js"></script>
  <script>
    updateCartCount();
  </script>
</body>

</html>
