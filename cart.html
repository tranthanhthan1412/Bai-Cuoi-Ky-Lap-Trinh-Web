<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Giỏ hàng</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- ICON -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="index.html"> 💻 LaptopX </a>

        <!-- MOBILE -->
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="menu">
          <!-- LEFT -->
          <ul class="navbar-nav ms-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Trang chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="products.html">Sản phẩm</a>
            </li>
          </ul>

          <!-- RIGHT -->
          <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-light">
              <i class="bi bi-telephone-fill"></i> 999999999
            </span>

            <a href="cart.html" class="btn btn-warning position-relative">
              🛒
              <span id="cart-count" class="badge bg-danger">0</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-4">
      <h3>Giỏ hàng</h3>

      <div class="row mt-3">
        <!-- LEFT: danh sách -->
        <div class="col-md-8">
          <div id="cart-list"></div>
        </div>

        <!-- RIGHT: thanh toán -->
        <div class="col-md-4">
          <div class="checkout-box">
            <h5>Tóm tắt đơn hàng</h5>

            <p>Tổng tiền:</p>
            <h4 id="total">0đ</h4>

            <button class="btn btn-warning w-100 mt-3">Thanh toán</button>
          </div>
        </div>
      </div>
    </div>
    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/main.js"></script>
    <script>
      renderCart();
      updateCartCount(); // cập nhật số trên icon
    </script>
  </body>
</html>
